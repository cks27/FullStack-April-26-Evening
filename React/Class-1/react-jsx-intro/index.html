<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

    <h1>React JSX Intro</h1>

    <div id="root"></div>

    <script type="text/babel" data-type="module">

        const root = ReactDOM.createRoot(document.getElementById("root"));


        function SectionComponentJSX() {
            return <section>
                <p>This is para 1</p>
                <p>This is para 2</p>
                <p>This is para 3</p>
            </section>
        }

        function Card() {
            return <figure>
                <img src="https://images.unsplash.com/photo-1781591272000-f7f4f0c386b0?w=900&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwzfHx8ZW58MHx8fHx8" alt="" />
                    <figcaption>
                        <h4>Some Card</h4>
                    </figcaption>
            </figure>
        }

        root.render(<SectionComponentJSX/>, document.getElementById('root'));
    </script>

    <script type="text/babel" src="script.js"></script>
</body>

</html>
