<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        input{
            width: 60px;
        }
    </style>
</head>
<body>

    <h1>Countdown Timer</h1>
    <input id="h-inp" type="number" min="0" max="23" placeholder="HH">
    <input id="m-inp" type="number" min="0" max="60" placeholder="MM">
    <input id="s-inp" type="number" min="0" max="60" placeholder="SS">

    <br>
    <br>
    <button id="start-btn">Start</button>

    <h3 id="timer-display"></h3>
    
    <script src="script.js"></script>
</body>
</html>
