<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <style>
        section i:hover{
            cursor: pointer;
        }

        .filled-star{
            color: orange;
        }
    </style>

</head>
<body>
    
    <h1>Star Rating</h1>

    <section id="star-rating-container">
        <i data-rating="1" class="bi bi-star-fill"></i>
        <i data-rating="2" class="bi bi-star-fill"></i>
        <i data-rating="3" class="bi bi-star-fill"></i>
        <i data-rating="4" class="bi bi-star-fill"></i>
        <i data-rating="5" class="bi bi-star-fill"></i>
    </section>

    <script src="script.js"></script>
</body>
</html>
